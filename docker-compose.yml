version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: url_shortener_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url_shortener_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      # Note the host change: from 'localhost' to 'postgres' inside the shared docker network boundary
      - DATABASE_URL=postgresql://postgres:supersecretpassword@postgres:5432/url_shortener?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: